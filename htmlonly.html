<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        #angle-min, #angle-max {
            color: #2196F3;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
        }
        input:checked + .slider {
            background-color: #2196F3;
        }
        input:focus + .slider {
            box-shadow: 0 0 1px #2196F3;
        }
        input:checked + .slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
        }
        .slider.round {
            border-radius: 34px;
        }
        .slider.round:before {
            border-radius: 50px;
        }
        #onoffdiv {
            margin-top: 6px;
            margin-left: 6px;
        }
        .button {
            background-color: #2196F3; /* Green */
            border: none;
            color: white;
            padding: 6%;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 30px;
            transform: scale(1);
        }
        .button-group {
            position: relative;
            margin-top: 10px;
            margin-bottom: 0px;
            text-align: center;
        }
        #speedDIV {
            position: relative;
            margin-top: 100px;
            text-align: center;
        }
        #settingbutton {
            position: relative;
            transform: scale(0.06);
            margin-top: -250px;
            margin-right: -70%;
            text-align: right;
            margin-bottom: 20px;
        }
        #setting {
            position: relative;
            text-align: center;
            background-color: Transparent;
            border: none;
        }
    </style>
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>
    <div data-role="page">
        <div data-role="header">
            <h1>Pumpe Winkel</h1>
        </div>
        <div data-role="main" class="ui-content">
            <div data-role="rangeslider">
                <label for="price-min">Winkel:</label>
                <input type="range" name="angle-min" id="angle-min" value="45" min="0" max="180">
                <label for="angle-max">Winkel:</label>
                <input type="range" name="angle-max" id="angle-max" value="135" min="0" max="180">
            </div>
        </div>
    </div>
    <div id="onoffdiv">
    <label class="switch">
        <input type="checkbox">
        <span class="slider round"></span>
    </label>
    </div>
    <div id=speedDIV>
        <p>Geschwindigkeit:</p>
    </div>
    <div class=button-group>
    <button class="button">1</button>
    <button class="button">2</button>
    <button class="button">3</button>
    <button class="button">4</button>
    <button class="button">5</button>
    </div>
    <div id="settingbutton">
    <button id="setting" onclick="myFunction()"><img src="https://raw.githubusercontent.com/eleminer/AquariumStroemungspumpeWinkel/master/settingPicture.png"></button>
    </div>
    <script>
    function alert()
    {
        prompt("Enter something!", "Text");
    }
    </script>
</body>
</html>
